<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renovation Estimator</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e7e9ee;
      --muted: #9aa3b2;
      --accent: #4f8cff;
      --accent-soft: #1d2b4a;
      --good: #34d399;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
    header h1 { margin: 0 0 4px; font-size: 26px; letter-spacing: -0.02em; }
    header p { margin: 0 0 28px; color: var(--muted); font-size: 14px; }

    .search { position: relative; }
    .search input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      font-size: 16px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color .15s;
    }
    .search input:focus { border-color: var(--accent); }
    .search .search-spin {
      /* Centre with margin, not transform — the spin animation owns `transform`
         (rotate), so translateY(-50%) would be overwritten each frame and jump. */
      position: absolute; right: 15px; top: 50%; margin-top: -9px;
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin .7s linear infinite; pointer-events: none;
    }

    .suggestions {
      position: absolute;
      z-index: 10;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    .suggestions .item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .suggestions .item:last-child { border-bottom: none; }
    .suggestions .item:hover { background: var(--accent-soft); }
    .suggestions .item .addr { flex: 1; }
    .suggestions .item .badge {
      font-size: 11px; color: var(--muted);
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 2px 8px; align-self: center; white-space: nowrap;
    }
    .suggestions .empty, .suggestions .hint { padding: 12px 16px; color: var(--muted); font-size: 14px; }

    .override { margin-top: 16px; }
    .override .toggle { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-size: 14px; color: var(--text); user-select: none; }
    .override .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .override .toggle .sub { color: var(--muted); font-size: 13px; }
    .override .fields {
      margin-top: 12px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    /* `display: grid` above outranks the bare [hidden] attribute, so hide explicitly. */
    .override .fields[hidden] { display: none; }
    /* min-width:0 lets the columns shrink; grid items default to min-width:auto
       (their intrinsic input width), which otherwise overflows the card. */
    .override .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .override .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .override .field input {
      width: 100%; padding: 7px 9px; font-size: 14px; color: var(--text);
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; outline: none; transition: border-color .15s;
    }
    .override .field input:focus { border-color: var(--accent); }
    @media (max-width: 620px) { .override .fields { grid-template-columns: repeat(2, 1fr); } }

    .status { margin-top: 24px; font-size: 14px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      margin-top: 24px; padding: 14px 16px;
      background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.35);
      border-radius: 12px; color: var(--danger); font-size: 14px;
    }

    .result { margin-top: 28px; display: none; }
    .result.show { display: block; }
    .result .selected { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
    .result .selected strong { color: var(--text); }

    .carousel { position: relative; margin-bottom: 20px; }
    .carousel .viewport { overflow: hidden; border-radius: 14px; border: 1px solid var(--border); background: var(--panel-2); aspect-ratio: 16 / 10; }
    .carousel .track { display: flex; height: 100%; transition: transform .3s ease; }
    .carousel .slide { min-width: 100%; height: 100%; }
    .carousel .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(15,17,21,.65);
      color: var(--text); font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .carousel .nav:hover { background: rgba(15,17,21,.95); }
    .carousel .nav.prev { left: 10px; }
    .carousel .nav.next { right: 10px; }
    .carousel .meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .carousel .thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: thin; }
    .carousel .thumbs img {
      flex: 0 0 auto; width: 68px; height: 50px; object-fit: cover;
      border-radius: 8px; border: 2px solid transparent; cursor: pointer;
      opacity: .55; transition: opacity .15s, border-color .15s;
    }
    .carousel .thumbs img:hover { opacity: .85; }
    .carousel .thumbs img.active { opacity: 1; border-color: var(--accent); }

    .totalcard {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px; margin-bottom: 20px;
    }
    .totalcard .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .06em; }
    .totalcard .amount { font-size: 30px; font-weight: 650; color: var(--good); letter-spacing: -0.02em; }

    .summary {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
      font-size: 14px; color: var(--text);
    }
    .summary .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }

    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    th, td { text-align: left; padding: 12px 14px; font-size: 14px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; background: var(--panel-2); }
    tbody tr:last-child td { border-bottom: none; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .none { padding: 22px; text-align: center; color: var(--muted); background: var(--panel); border: 1px solid var(--border); border-radius: 14px; }

    .disclaimer { margin-top: 18px; font-size: 12px; color: var(--muted); line-height: 1.6; }

    details.settings { margin-top: 32px; }
    details.settings summary { color: var(--muted); font-size: 13px; cursor: pointer; }
    details.settings .setrow { display: flex; flex-direction: column; gap: 5px; margin-top: 14px; }
    details.settings .setrow label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    details.settings .setrow .help { text-transform: none; letter-spacing: 0; opacity: .8; }
    details.settings input, details.settings select {
      width: 100%; padding: 10px 12px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-size: 14px; outline: none;
    }
    details.settings input:focus, details.settings select:focus { border-color: var(--accent); }
    details.settings .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    details.settings .grid2 .setrow { margin-top: 0; min-width: 0; }
    @media (max-width: 620px) { details.settings .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Renovation Estimator</h1>
      <p>Search an address, pick the property, and we'll estimate detected renovations.</p>
    </header>

    <div class="search">
      <input id="q" type="text" placeholder="Search an address, e.g. 1 Fullarton Street" autocomplete="off" />
      <div id="searchSpin" class="search-spin" hidden></div>
      <div id="suggestions" class="suggestions" hidden></div>
    </div>

    <div class="override">
      <label class="toggle">
        <input type="checkbox" id="overrideToggle" />
        <span>Override property details <span class="sub">— use these instead of rpdata's, set them before picking an address</span></span>
      </label>
      <div id="overrideFields" class="fields" hidden>
        <div class="field"><label>Bedrooms</label><input id="ovBeds" type="number" min="0" inputmode="numeric" placeholder="—" /></div>
        <div class="field"><label>Bathrooms</label><input id="ovBaths" type="number" min="0" inputmode="numeric" placeholder="—" /></div>
        <div class="field"><label>Car Spaces</label><input id="ovCarSpaces" type="number" min="0" inputmode="numeric" placeholder="—" /></div>
        <div class="field"><label>Year Built</label><input id="ovYearBuilt" type="number" inputmode="numeric" placeholder="—" /></div>
      </div>
    </div>

    <div id="status" class="status" hidden></div>
    <div id="error" class="error" hidden></div>

    <section id="result" class="result">
      <div id="selected" class="selected"></div>
      <div id="carousel" class="carousel" hidden>
        <div class="viewport"><div id="track" class="track"></div></div>
        <button class="nav prev" id="prevBtn" type="button" aria-label="Previous photo">‹</button>
        <button class="nav next" id="nextBtn" type="button" aria-label="Next photo">›</button>
        <div class="meta"><span id="carouselCounter"></span><span id="carouselDate"></span></div>
        <div id="thumbs" class="thumbs"></div>
      </div>
      <div class="totalcard">
        <span class="label">Renovations Total</span>
        <span id="total" class="amount">$0.00</span>
      </div>
      <div id="summaryWrap" class="summary" hidden>
        <div class="label">Summary</div>
        <div id="summary"></div>
      </div>
      <div id="tableWrap"></div>
      <div id="disclaimer" class="disclaimer"></div>
    </section>

    <details class="settings">
      <summary>Model &amp; settings</summary>

      <div class="setrow">
        <label for="model">Model <span class="help">— blank uses the server default</span></label>
        <input id="model" type="text" list="modelOptions" placeholder="e.g. gpt-5.4-mini" autocomplete="off" />
        <datalist id="modelOptions">
          <option value="gpt-5.4-mini"></option>
          <option value="gpt-5.4"></option>
          <option value="gpt-4.1"></option>
          <option value="gpt-4o"></option>
        </datalist>
      </div>

      <div class="grid2" style="margin-top:14px;">
        <div class="setrow">
          <label for="reasoningEffort">Reasoning effort <span class="help">— gpt-5.x / o-series</span></label>
          <select id="reasoningEffort">
            <option value="">Default (low)</option>
            <option value="minimal">minimal</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </div>
        <div class="setrow">
          <label for="temperature">Temperature <span class="help">— classic models</span></label>
          <input id="temperature" type="number" min="0" max="2" step="0.1" placeholder="Default (0)" />
        </div>
      </div>

      <div class="setrow">
        <label for="apiKey">Auth</label>
        <input id="apiKey" type="password" placeholder="secret-sauce header (only if the API requires one)" />
      </div>
    </details>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const qEl = $("q"), sugEl = $("suggestions"), statusEl = $("status"),
          errorEl = $("error"), resultEl = $("result");

    let debounce;
    let activeQuery = "";

    $("overrideToggle").addEventListener("change", (e) => {
      $("overrideFields").hidden = !e.target.checked;
    });

    // Build the property override from the ticked fields. Only non-empty fields
    // are sent, under rpdata's own keys, so the model sees the same shape it
    // would from a fetched property. Returns null when override is off/blank.
    function buildOverride() {
      if (!$("overrideToggle").checked) return null;
      const map = { beds: "ovBeds", baths: "ovBaths", carSpaces: "ovCarSpaces", yearBuilt: "ovYearBuilt" };
      const property = {};
      for (const [key, id] of Object.entries(map)) {
        const v = $(id).value.trim();
        if (v !== "") property[key] = v;
      }
      return Object.keys(property).length ? property : null;
    }

    function showStatus(msg) {
      statusEl.innerHTML = msg ? `<span class="spinner"></span><span>${msg}</span>` : "";
      statusEl.hidden = !msg;
    }
    function showError(msg) {
      errorEl.textContent = msg || "";
      errorEl.hidden = !msg;
    }
    function clearSuggestions() { sugEl.innerHTML = ""; sugEl.hidden = true; }
    function setSearching(on) { $("searchSpin").hidden = !on; }

    qEl.addEventListener("input", () => {
      const q = qEl.value.trim();
      activeQuery = q;
      clearTimeout(debounce);
      showError("");
      if (q.length < 3) { setSearching(false); clearSuggestions(); return; }
      // Immediate feedback while the debounce + request are in flight.
      setSearching(true);
      sugEl.innerHTML = `<div class="hint">Searching…</div>`;
      sugEl.hidden = false;
      debounce = setTimeout(() => runSearch(q), 300);
    });

    async function runSearch(q) {
      try {
        const resp = await fetch(`/search?q=${encodeURIComponent(q)}`);
        if (q !== activeQuery) return; // a newer keystroke won
        if (!resp.ok) throw new Error((await resp.json()).detail || `Search failed (${resp.status})`);
        const { suggestions } = await resp.json();
        renderSuggestions(suggestions || []);
      } catch (e) {
        clearSuggestions();
        showError(e.message);
      } finally {
        if (q === activeQuery) setSearching(false);
      }
    }

    function renderSuggestions(items) {
      if (!items.length) {
        sugEl.innerHTML = `<div class="empty">No matching addresses.</div>`;
        sugEl.hidden = false;
        return;
      }
      sugEl.innerHTML = "";
      for (const s of items) {
        const div = document.createElement("div");
        div.className = "item";
        const badge = s.isUnit ? "Unit" : (s.suggestionType || "address");
        div.innerHTML = `<span class="addr"></span><span class="badge"></span>`;
        div.querySelector(".addr").textContent = s.suggestion;
        div.querySelector(".badge").textContent = badge;
        div.addEventListener("click", () => selectSuggestion(s));
        sugEl.appendChild(div);
      }
      sugEl.hidden = false;
    }

    async function selectSuggestion(s) {
      clearSuggestions();
      qEl.value = s.suggestion;
      activeQuery = s.suggestion;
      resultEl.classList.remove("show");
      showError("");
      showStatus("Thinking…");

      // Photos load in parallel — they're non-fatal to the estimate.
      loadPhotos(s.suggestionId);

      try {
        const headers = { "Content-Type": "application/json" };
        const key = $("apiKey").value.trim();
        if (key) headers["secret-sauce"] = key;

        const body = { rpId: String(s.suggestionId) };
        const override = buildOverride();
        if (override) body.property = override;

        const model = $("model").value.trim();
        if (model) body.model = model;
        const effort = $("reasoningEffort").value;
        if (effort) body.reasoningEffort = effort;
        const temp = $("temperature").value.trim();
        if (temp !== "") body.temperature = Number(temp);

        const resp = await fetch("/estimate", {
          method: "POST",
          headers,
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || `Estimate failed (${resp.status})`);
        renderResult(s, data);
      } catch (e) {
        showError(e.message);
      } finally {
        showStatus("");
      }
    }

    function renderResult(s, data) {
      $("selected").innerHTML = `Showing estimate for <strong></strong> &nbsp;·&nbsp; rp_id ${s.suggestionId}`;
      $("selected").querySelector("strong").textContent = s.suggestion;

      $("total").textContent = data["Renovations Total"] || "$0.00";

      const summary = data["Summary Description"] || "";
      $("summary").textContent = summary;
      $("summaryWrap").hidden = !summary;

      const renos = data["Renovations"] || [];
      const tableWrap = $("tableWrap");
      if (!renos.length) {
        tableWrap.innerHTML = `<div class="none">No depreciable renovations were detected from the property's photos.</div>`;
      } else {
        const rows = renos.map((r) => `
          <tr>
            <td>${escapeHtml(r.Name ?? "")}</td>
            <td>${escapeHtml(r.Year ?? "")}</td>
            <td class="num">${escapeHtml(String(r.Quantity ?? ""))}</td>
            <td>${escapeHtml(r.Unit ?? "")}</td>
            <td class="num">${escapeHtml(r.DefaultRate ?? "")}</td>
            <td class="num">${escapeHtml(r.FinalCost ?? "")}</td>
          </tr>`).join("");
        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Renovation</th><th>Year</th>
                <th class="num">Qty</th><th>Unit</th>
                <th class="num">Rate</th><th class="num">Cost</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      $("disclaimer").textContent = data["Disclaimer"] || "";
      resultEl.classList.add("show");
    }

    // ---- Photo carousel ----
    let carouselPhotos = [], carouselIndex = 0;

    async function loadPhotos(rpId) {
      $("carousel").hidden = true;
      carouselPhotos = []; carouselIndex = 0;
      try {
        const resp = await fetch(`/photos?rpId=${encodeURIComponent(rpId)}`);
        if (!resp.ok) return; // non-fatal: the estimate still renders
        const { photos } = await resp.json();
        if (!photos || !photos.length) return;
        carouselPhotos = photos;
        renderCarousel();
      } catch { /* non-fatal */ }
    }

    function renderCarousel() {
      $("track").innerHTML = carouselPhotos.map((p) =>
        `<div class="slide"><img loading="lazy" alt="Property photo" src="${escapeHtml(p.url)}" /></div>`
      ).join("");
      const multi = carouselPhotos.length > 1;
      $("prevBtn").hidden = !multi;
      $("nextBtn").hidden = !multi;

      const thumbs = $("thumbs");
      thumbs.hidden = !multi;
      thumbs.innerHTML = multi
        ? carouselPhotos.map((p, i) =>
            `<img loading="lazy" alt="Photo ${i + 1}" data-index="${i}" src="${escapeHtml(p.url)}" />`
          ).join("")
        : "";

      carouselIndex = 0;
      updateCarousel();
      $("carousel").hidden = false;
    }

    function updateCarousel() {
      $("track").style.transform = `translateX(-${carouselIndex * 100}%)`;
      const p = carouselPhotos[carouselIndex];
      $("carouselCounter").textContent = `${carouselIndex + 1} / ${carouselPhotos.length}`;
      $("carouselDate").textContent = p && p.date ? p.date : "";

      const thumbs = $("thumbs").children;
      for (let i = 0; i < thumbs.length; i++) {
        const active = i === carouselIndex;
        thumbs[i].classList.toggle("active", active);
        if (active) thumbs[i].scrollIntoView({ block: "nearest", inline: "nearest" });
      }
    }

    $("thumbs").addEventListener("click", (e) => {
      const idx = e.target.dataset && e.target.dataset.index;
      if (idx === undefined) return;
      carouselIndex = Number(idx);
      updateCarousel();
    });

    function moveCarousel(delta) {
      const n = carouselPhotos.length;
      if (!n) return;
      carouselIndex = (carouselIndex + delta + n) % n;
      updateCarousel();
    }
    $("prevBtn").addEventListener("click", () => moveCarousel(-1));
    $("nextBtn").addEventListener("click", () => moveCarousel(1));

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    // Dismiss the suggestions dropdown when clicking outside the search box.
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search")) clearSuggestions();
    });
  </script>
</body>
</html>
